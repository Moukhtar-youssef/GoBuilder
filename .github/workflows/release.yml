name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build GoBuilder (host binary)
        run: |
          go build \
            -ldflags "-X github.com/Moukhtar-youssef/GoBuilder/cmd.version=${{ steps.version.outputs.VERSION }}" \
            -o GoBuilder-build .

      - name: Build and compress all first-class platforms using GoBuilder
        run: |
          ./GoBuilder-build \
            --project . \
            --output dist \
            --name GoBuilder \
            --first-class-only \
            --compress \
            --entry main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GoBuilder ${{ steps.version.outputs.VERSION }}
          body: |
            ## GoBuilder ${{ steps.version.outputs.VERSION }}

            ### Installation

            **Via `go install`:**
            ```bash
            go install github.com/Moukhtar-youssef/GoBuilder@${{ steps.version.outputs.VERSION }}
            ```

            **Download a binary below** and extract it to a directory in your PATH.

            ### Checksums
            See `checksums.txt` attached below.
          files: |
            dist/*
          generate_release_notes: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: dist/checksums.txt
